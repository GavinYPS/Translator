<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VoiceBridge</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b12;--s1:#0d1220;--s2:#131a2e;--s3:#192038;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#dde4f0;--muted:#3d4f6b;--muted2:#5a7099;
  --accent:#4f8ef7;--live:#22c55e;--danger:#ef4444;
  --grad:linear-gradient(135deg,#4f8ef7,#06b6d4);
}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  display:flex;flex-direction:column;
  height:100vh;height:-webkit-fill-available;
  background:var(--bg);color:var(--text);
  font-family:'Inter',sans-serif;font-size:15px;
  overflow:hidden;
}

/* Header */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);
  background:var(--s1);flex-shrink:0;gap:8px;
  padding-top:max(12px,env(safe-area-inset-top));
}
.brand{display:flex;align-items:center;gap:9px}
.bmark{width:30px;height:30px;border-radius:8px;background:var(--grad);display:grid;place-items:center;font-size:15px;flex-shrink:0}
.bname{font-size:1rem;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.bsub{font-size:.62rem;color:var(--muted2);font-family:'JetBrains Mono',monospace;margin-top:1px}
.hbtns{display:flex;gap:6px}
.hbtn{background:none;border:1px solid var(--border2);border-radius:7px;color:var(--muted2);font-size:.72rem;padding:5px 10px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .18s;-webkit-tap-highlight-color:transparent}
.hbtn:active{color:var(--text)}
.hbtn.d:active{color:var(--danger);border-color:var(--danger)}

/* Lang bar */
.lang-bar{
  background:var(--s1);border-bottom:1px solid var(--border);
  padding:8px 14px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;flex-shrink:0;
}
.lb-label{font-size:.62rem;font-family:'JetBrains Mono',monospace;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.lang-pills{display:flex;gap:5px;flex-wrap:wrap;flex:1;align-items:center}
.lpill{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--border2);border-radius:20px;padding:3px 8px 3px 9px}
.lpill-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lpill-label{font-size:.75rem;font-weight:500;color:var(--text);white-space:nowrap}
.lpill-rm{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:.75rem;padding:1px 3px;line-height:1;border-radius:3px;-webkit-tap-highlight-color:transparent}
.add-lang{display:flex;align-items:center;gap:4px;background:none;border:1px dashed var(--muted);border-radius:20px;padding:3px 11px;color:var(--muted2);font-size:.72rem;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;-webkit-tap-highlight-color:transparent}

/* Thread */
.thread{flex:1;overflow-y:auto;padding:16px 14px 10px;display:flex;flex-direction:column;gap:0;min-height:0}
.thread::-webkit-scrollbar{width:3px}
.thread::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--muted2);gap:8px;padding:30px;margin:auto}
.ei{font-size:2.4rem;opacity:.3;margin-bottom:4px}
.et{font-size:.9rem;font-weight:600;color:var(--muted2)}
.eb{font-size:.75rem;line-height:1.7;max-width:240px;color:var(--muted)}

/* Messages */
.msg-group{display:flex;flex-direction:column;margin-bottom:18px}
.msg-hdr{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.msg-av{width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:.6rem;font-weight:700;color:#fff;flex-shrink:0}
.msg-sp{font-size:.7rem;font-weight:600}
.msg-time{font-size:.6rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-left:auto}
.bstack{display:flex;flex-direction:column;gap:4px;margin-left:26px}
.borig{font-size:.76rem;color:var(--muted2);font-style:italic;line-height:1.5;word-break:break-word;margin-bottom:2px}
.btrans{display:inline-block;max-width:80%;background:var(--s2);border:1px solid var(--border2);border-radius:4px 14px 14px 14px;padding:9px 13px;font-size:.92rem;line-height:1.6;color:var(--text);word-break:break-word}
.bacts{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.bact{background:none;border:1px solid var(--border);border-radius:5px;color:var(--muted2);font-size:.64rem;padding:3px 9px;cursor:pointer;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent}
.bact.sp:active{color:#06b6d4;border-color:#06b6d4}

/* Live bar */
.live-bar{background:var(--s1);border-top:1px solid var(--border);padding:10px 14px;flex-shrink:0;display:none;flex-direction:column;gap:3px}
.live-bar.show{display:flex}
.live-top{display:flex;align-items:center;gap:7px}
.live-ind{display:flex;align-items:center;gap:4px;font-size:.64rem;font-family:'JetBrains Mono',monospace;color:var(--live)}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--live);animation:pd 1s ease-in-out infinite}
@keyframes pd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.65)}}
.live-sp{font-size:.68rem;font-weight:600}
.live-orig{font-size:.75rem;color:var(--muted2);font-style:italic;min-height:17px;line-height:1.5;word-break:break-word}
.live-trans{font-size:.88rem;color:var(--text);min-height:19px;line-height:1.6;word-break:break-word}
.cursor{display:inline-block;width:2px;height:.9em;background:var(--accent);vertical-align:text-bottom;margin-left:2px;animation:cb .65s step-end infinite}
@keyframes cb{0%,100%{opacity:1}50%{opacity:0}}

/* Mic zone */
.mic-zone{
  background:var(--s1);border-top:1px solid var(--border);
  padding:14px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;
  flex-shrink:0;
  padding-bottom:max(14px,env(safe-area-inset-bottom));
}

/* Volume gauge - waveform bars */
.gauge-wrap{width:100%;max-width:280px;display:flex;flex-direction:column;align-items:center;gap:4px}
.gauge-bars{width:100%;display:flex;align-items:center;justify-content:center;gap:3px;height:32px}
.gbar{width:4px;border-radius:2px;background:var(--s3);transition:height .07s ease,background .12s;min-height:3px;height:3px}
.gauge-status{font-size:.62rem;font-family:'JetBrains Mono',monospace;color:var(--muted2);letter-spacing:.04em;height:14px}

/* Mic button */
.mic-row{display:flex;align-items:center;gap:14px}
.big-mic{
  width:62px;height:62px;border-radius:50%;border:none;cursor:pointer;
  display:grid;place-items:center;font-size:1.6rem;
  background:var(--grad);box-shadow:0 4px 20px rgba(79,142,247,0.28);
  transition:transform .14s,box-shadow .18s;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.big-mic:active{transform:scale(.92)}
.big-mic.on{
  background:linear-gradient(135deg,#ef4444,#f97316);
  box-shadow:0 4px 20px rgba(239,68,68,0.32);
  animation:mp 1.5s ease-in-out infinite;
}
@keyframes mp{
  0%,100%{box-shadow:0 4px 20px rgba(239,68,68,0.32)}
  50%{box-shadow:0 4px 36px rgba(239,68,68,0.55),0 0 0 12px rgba(239,68,68,0.07)}
}
.mic-label{font-size:.72rem;color:var(--muted2);font-family:'JetBrains Mono',monospace;letter-spacing:.03em;line-height:1.5;text-align:left}

/* Spinner */
.spin{display:inline-block;width:10px;height:10px;border:1.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:sp .5s linear infinite;vertical-align:middle;margin-left:3px}
@keyframes sp{to{transform:rotate(360deg)}}

/* Overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.picker{background:#0f1520;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:18px;max-width:320px;width:100%}
.picker-title{font-weight:600;font-size:.95rem;margin-bottom:12px;color:var(--text)}
.picker-list{display:flex;flex-direction:column;gap:5px;max-height:55vh;overflow-y:auto;margin-bottom:12px}
.picker-item{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);cursor:pointer;font-family:'Inter',sans-serif;font-size:.85rem;text-align:left;-webkit-tap-highlight-color:transparent}
.picker-item:active{border-color:rgba(79,142,247,0.5);background:var(--s3)}
.picker-close{background:none;border:1px solid var(--border);border-radius:7px;padding:8px 18px;color:var(--muted2);cursor:pointer;font-family:'Inter',sans-serif;font-size:.8rem}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="bmark">🌐</div>
    <div>
      <div class="bname">VoiceBridge</div>
      <div class="bsub">auto-detect · live translate</div>
    </div>
  </div>
  <div class="hbtns">
    <button class="hbtn d" id="clearBtn">Clear</button>
    <button class="hbtn" id="exportBtn">Export</button>
  </div>
</header>

<div class="lang-bar">
  <span class="lb-label">Translate to:</span>
  <div class="lang-pills" id="langPills"></div>
  <button class="add-lang" id="addLangBtn">+ Add</button>
</div>

<div class="thread" id="thread"></div>

<div class="live-bar" id="liveBar">
  <div class="live-top">
    <div class="live-ind"><span class="ldot"></span>LIVE</div>
    <span class="live-sp" id="liveSp"></span>
  </div>
  <div class="live-orig" id="liveOrig"></div>
  <div class="live-trans" id="liveTrans"></div>
</div>

<div class="mic-zone">
  <div class="gauge-wrap" id="gaugeWrap" style="display:none">
    <div class="gauge-bars" id="gaugeBars"></div>
    <div class="gauge-status" id="gaugeStatus"></div>
  </div>
  <div class="mic-row">
    <button class="big-mic" id="micBtn">🎙</button>
    <div class="mic-label" id="micLabel">Tap to start listening</div>
  </div>
</div>

<script>
const ALL_LANGS = [
  {code:'en-GB', label:'English',               name:'English'},
  {code:'ms-MY', label:'Malay',                 name:'Malay'},
  {code:'zh-CN', label:'Mandarin (Simplified)', name:'Mandarin Chinese (Simplified)'},
  {code:'zh-TW', label:'Mandarin (Traditional)',name:'Mandarin Chinese (Traditional)'},
  {code:'es-ES', label:'Spanish',               name:'Spanish'},
  {code:'fr-FR', label:'French',                name:'French'},
  {code:'de-DE', label:'German',                name:'German'},
  {code:'it-IT', label:'Italian',               name:'Italian'},
  {code:'pt-BR', label:'Portuguese',            name:'Portuguese'},
  {code:'ja-JP', label:'Japanese',              name:'Japanese'},
  {code:'ko-KR', label:'Korean',                name:'Korean'},
  {code:'ar-SA', label:'Arabic',                name:'Arabic'},
  {code:'hi-IN', label:'Hindi',                 name:'Hindi'},
  {code:'th-TH', label:'Thai',                  name:'Thai'},
  {code:'vi-VN', label:'Vietnamese',            name:'Vietnamese'},
  {code:'id-ID', label:'Indonesian',            name:'Indonesian'},
  {code:'ru-RU', label:'Russian',               name:'Russian'},
  {code:'tr-TR', label:'Turkish',               name:'Turkish'},
  {code:'nl-NL', label:'Dutch',                 name:'Dutch'},
  {code:'pl-PL', label:'Polish',                name:'Polish'},
  {code:'sv-SE', label:'Swedish',               name:'Swedish'},
];
const COLORS = ['#4f8ef7','#22c55e','#f59e0b','#ef4444','#a855f7','#06b6d4','#f97316','#ec4899'];

// ── State ──────────────────────────────────────────────
let targetLangs = [
  {code:'en-GB', label:'English', name:'English', color:COLORS[0]},
  {code:'ms-MY', label:'Malay',   name:'Malay',   color:COLORS[1]},
];
let messages = [];
let listening = false;
let recognition = null;
let msgIdCounter = 0;
let liveDetectedLang = '';
let liveDetectedColor = COLORS[0];
let liveTransTimeout = null;
let lastTranslatedText = '';
let lastFinalText = '';
let currentLiveTrans = '';

// ── Audio gauge ────────────────────────────────────────
const BAR_COUNT = 28;
let audioCtx = null, analyser = null, micStream = null, gaugeRaf = null;

function initBars() {
  const wrap = document.getElementById('gaugeBars');
  wrap.innerHTML = '';
  for (let i = 0; i < BAR_COUNT; i++) {
    const b = document.createElement('div');
    b.className = 'gbar';
    wrap.appendChild(b);
  }
}
initBars();

async function startGauge() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(micStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 128;
    analyser.smoothingTimeConstant = 0.75;
    src.connect(analyser);
    document.getElementById('gaugeWrap').style.display = 'flex';
    animateGauge();
  } catch(e) {
    console.warn('Gauge unavailable:', e.message);
  }
}

function animateGauge() {
  if (!analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  const bars = document.querySelectorAll('.gbar');
  const step = Math.max(1, Math.floor(data.length / BAR_COUNT));
  let loudness = 0;
  bars.forEach((b, i) => {
    // Bell-curve weighting — more visual in middle
    const centre = Math.abs(i - BAR_COUNT / 2) / (BAR_COUNT / 2);
    const raw = data[Math.min(i * step, data.length - 1)] || 0;
    loudness += raw;
    const boosted = raw * (1 - centre * 0.4);
    const h = Math.max(3, Math.round((boosted / 255) * 28));
    b.style.height = h + 'px';
    const pct = boosted / 255;
    b.style.background = pct < 0.1 ? 'var(--s3)' : pct < 0.45 ? 'var(--accent)' : 'var(--live)';
  });
  const avg = loudness / BAR_COUNT;
  const st = document.getElementById('gaugeStatus');
  st.textContent = avg < 8 ? 'silence' : avg < 50 ? 'listening…' : 'speaking!';
  st.style.color = avg < 8 ? 'var(--muted)' : avg < 50 ? 'var(--muted2)' : 'var(--live)';
  gaugeRaf = requestAnimationFrame(animateGauge);
}

function stopGauge() {
  if (gaugeRaf) { cancelAnimationFrame(gaugeRaf); gaugeRaf = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (audioCtx) { audioCtx.close().catch(()=>{}); audioCtx = null; }
  analyser = null;
  document.getElementById('gaugeWrap').style.display = 'none';
  document.querySelectorAll('.gbar').forEach(b => { b.style.height = '3px'; b.style.background = 'var(--s3)'; });
  document.getElementById('gaugeStatus').textContent = '';
}

// ── Speech Recognition ─────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

function setStatus(msg, color) {
  setMicLabel(msg);
  const gs = document.getElementById('gaugeStatus');
  gs.textContent = msg;
  gs.style.color = color || 'var(--muted2)';
}

function buildRec() {
  const rec = new SR();
  rec.continuous = true;
  rec.interimResults = true;
  rec.maxAlternatives = 1;
  rec.lang = navigator.language || 'en-GB';

  rec.onstart = () => {
    document.getElementById('liveBar').classList.add('show');
    document.getElementById('gaugeWrap').style.display = 'flex';
    document.getElementById('liveSp').textContent = 'detecting…';
    document.getElementById('liveSp').style.color = 'var(--muted2)';
    setStatus('Mic active — speak now', 'var(--live)');
  };

  rec.onresult = (event) => {
    let interim = '';
    let newFinal = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const r = event.results[i];
      const t = r[0].transcript;
      if (r.isFinal) {
        newFinal += t + ' ';
        const detectedCode = r[0].lang || rec.lang || '';
        if (detectedCode) setDetectedLang(detectedCode);
      } else {
        interim += t;
      }
    }
    if (newFinal) lastFinalText += newFinal;
    const full = (lastFinalText + interim).trim();
    if (!full) return;

    setStatus('Speaking detected!', 'var(--live)');

    const origEl = document.getElementById('liveOrig');
    origEl.innerHTML = escHtml(full) + (interim ? '<span class="cursor"></span>' : '');

    clearTimeout(liveTransTimeout);
    if (full !== lastTranslatedText) {
      liveTransTimeout = setTimeout(() => {
        doTranslate(full, !interim && !!newFinal);
      }, 480);
    }
  };

  rec.onend = () => {
    if (listening) {
      setStatus('Restarting…', 'var(--muted2)');
      setTimeout(() => {
        try { rec.start(); setStatus('Mic active — speak now', 'var(--live)'); }
        catch(e) { setStatus('Restart failed: ' + e.message, 'var(--danger)'); }
      }, 200);
    }
  };

  rec.onerror = (e) => {
    console.warn('SR error:', e.error);
    if (e.error === 'no-speech') {
      setStatus('No speech — keep talking', 'var(--muted2)');
      return;
    }
    if (e.error === 'not-allowed' || e.error === 'permission-denied') {
      setStatus('Mic blocked — allow mic in browser settings', 'var(--danger)');
      doStop(); return;
    }
    if (e.error === 'network') {
      setStatus('Network error — check connection', 'var(--danger)');
      return;
    }
    setStatus('Error: ' + e.error, 'var(--danger)');
    if (listening && e.error !== 'aborted') {
      setTimeout(() => { try { rec.start(); } catch(ex){} }, 600);
    }
  };

  return rec;
}

function setDetectedLang(code) {
  const base = code.split('-')[0];
  const match = ALL_LANGS.find(l => l.code === code || l.code.split('-')[0] === base);
  liveDetectedLang = match ? match.label : code;
  liveDetectedColor = COLORS[0];
  const sp = document.getElementById('liveSp');
  sp.textContent = liveDetectedLang;
  sp.style.color = liveDetectedColor;
}

// ── Translation ────────────────────────────────────────
async function doTranslate(text, isFinal) {
  if (!text || !targetLangs.length) return;
  lastTranslatedText = text;

  const transEl = document.getElementById('liveTrans');
  transEl.innerHTML = '<span style="color:var(--muted2)">Translating<span class="spin"></span></span>';

  const isMulti = targetLangs.length > 1;
  const targetDesc = targetLangs.map(l => l.name).join(' and ');
  const systemPrompt = isMulti
    ? `You are a real-time voice translator. Detect the spoken language automatically. Translate the text into each of these languages: ${targetDesc}.\nRespond EXACTLY in this format, one per line:\n${targetLangs.map(l=>`[${l.label}]: <translation here>`).join('\n')}\nNo other text.`
    : `You are a real-time voice translator. Detect the spoken language automatically and translate it into ${targetDesc}. Return ONLY the translation — no labels, no quotes, no explanation.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{role:'user', content: text}]
      })
    });
    const data = await resp.json();
    const raw = data?.content?.[0]?.text?.trim() || '';
    currentLiveTrans = raw;

    // Render in live bar
    if (isMulti) {
      transEl.innerHTML = parseMultiTrans(raw, true);
    } else {
      transEl.textContent = raw;
    }

    // Commit to thread on final
    if (isFinal && lastFinalText.trim()) {
      commitMessage(lastFinalText.trim(), raw);
      lastFinalText = '';
      currentLiveTrans = '';
      lastTranslatedText = '';
      setTimeout(() => {
        document.getElementById('liveOrig').textContent = '';
        document.getElementById('liveTrans').textContent = '';
      }, 400);
    }
  } catch(err) {
    transEl.textContent = 'Translation error';
    console.error(err);
  }
}

function parseMultiTrans(raw, forLiveBar) {
  const lines = raw.split('\n').filter(l => l.trim());
  return lines.map(line => {
    const m = line.match(/^\[(.+?)\]:\s*(.+)$/);
    if (m) {
      const tl = targetLangs.find(l => l.label === m[1]);
      const col = tl ? tl.color : 'var(--text)';
      return `<div style="margin-bottom:3px"><span style="font-size:.6rem;color:${col};font-family:'JetBrains Mono',monospace;margin-right:4px">${escHtml(m[1])}</span>${escHtml(m[2])}</div>`;
    }
    return `<div>${escHtml(line)}</div>`;
  }).join('');
}

// ── Commit message ─────────────────────────────────────
function commitMessage(original, raw) {
  let translations = {};
  if (targetLangs.length === 1) {
    translations[targetLangs[0].code] = raw;
  } else {
    raw.split('\n').forEach(line => {
      const m = line.match(/^\[(.+?)\]:\s*(.+)$/);
      if (m) {
        const tl = targetLangs.find(l => l.label === m[1]);
        if (tl) translations[tl.code] = m[2].trim();
      }
    });
  }
  messages.push({
    id: ++msgIdCounter,
    original,
    translations,
    lang: liveDetectedLang || 'Auto',
    color: liveDetectedColor || COLORS[0],
    time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
  });
  renderThread();
}

// ── Thread render ──────────────────────────────────────
function renderThread() {
  const thread = document.getElementById('thread');
  if (!messages.length) {
    thread.innerHTML = `<div class="empty"><div class="ei">🎙</div><div class="et">Ready to listen</div><div class="eb">Press the mic. Speech is auto-detected and translated live.</div></div>`;
    return;
  }
  thread.innerHTML = messages.map(msg => {
    const transBlocks = targetLangs.map(tl => {
      const text = msg.translations[tl.code] || '—';
      return `<div style="margin-bottom:5px">
        ${targetLangs.length > 1 ? `<div style="font-size:.6rem;color:${tl.color};font-family:'JetBrains Mono',monospace;margin-bottom:2px">${tl.label}</div>` : ''}
        <div class="btrans">${escHtml(text)}</div>
      </div>`;
    }).join('');

    const speakBtns = targetLangs.map(tl => {
      const text = msg.translations[tl.code] || '';
      if (!text || text === '—') return '';
      return `<button class="bact sp" data-text="${escHtml(text)}" data-lang="${tl.code}">🔊${targetLangs.length>1?' '+tl.label:''}</button>`;
    }).join('');

    return `<div class="msg-group" id="msg-${msg.id}">
      <div class="msg-hdr">
        <div class="msg-av" style="background:${msg.color}">${(msg.lang||'?')[0].toUpperCase()}</div>
        <span class="msg-sp" style="color:${msg.color}">${escHtml(msg.lang)}</span>
        <span class="msg-time">${msg.time}</span>
      </div>
      <div class="bstack">
        <div class="borig">${escHtml(msg.original)}</div>
        ${transBlocks}
        <div class="bacts">${speakBtns}<button class="bact" data-copy="${msg.id}">Copy</button></div>
      </div>
    </div>`;
  }).join('');

  thread.querySelectorAll('.bact.sp').forEach(b => b.addEventListener('click', () => {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(b.dataset.text);
    u.lang = b.dataset.lang;
    window.speechSynthesis.speak(u);
  }));
  thread.querySelectorAll('[data-copy]').forEach(b => b.addEventListener('click', () => {
    const msg = messages.find(m => m.id == b.dataset.copy);
    if (!msg) return;
    const txt = [msg.original, ...Object.entries(msg.translations).map(([c,t])=>{
      const l = targetLangs.find(x=>x.code===c);
      return `[${l?l.label:c}] ${t}`;
    })].join('\n');
    navigator.clipboard.writeText(txt).catch(()=>{});
  }));

  thread.scrollTop = thread.scrollHeight;
}

// ── Start / stop ───────────────────────────────────────
async function doStart() {
  if (!SR) {
    alert('Speech recognition requires Chrome on Android, or Safari on iOS 15+.');
    return;
  }

  // Step 1: explicitly request mic permission so user sees the prompt
  setMicLabel('Requesting mic permission…');
  try {
    await navigator.mediaDevices.getUserMedia({audio: true});
  } catch(e) {
    setMicLabel('Mic permission denied — allow mic in browser settings then try again');
    return;
  }

  // Step 2: start gauge (reuses the stream)
  startGauge();

  // Step 3: start recognition
  listening = true;
  lastFinalText = '';
  currentLiveTrans = '';
  lastTranslatedText = '';
  liveDetectedLang = '';
  document.getElementById('liveOrig').textContent = '';
  document.getElementById('liveTrans').textContent = '';
  recognition = buildRec();
  try {
    recognition.start();
  } catch(e) {
    setMicLabel('Could not start: ' + e.message);
    listening = false;
    stopGauge();
    return;
  }
  document.getElementById('micBtn').classList.add('on');
  document.getElementById('micBtn').textContent = '⏹';
}

function doStop() {
  listening = false;
  clearTimeout(liveTransTimeout);
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
  stopGauge();
  // Commit anything pending
  if (lastFinalText.trim() && currentLiveTrans) {
    commitMessage(lastFinalText.trim(), currentLiveTrans);
    lastFinalText = '';
  }
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('micBtn').textContent = '🎙';
  document.getElementById('liveBar').classList.remove('show');
  setMicLabel('Tap to start listening');
}

function setMicLabel(t) { document.getElementById('micLabel').textContent = t; }
document.getElementById('micBtn').addEventListener('click', () => { listening ? doStop() : doStart(); });

// ── Language pills ─────────────────────────────────────
function renderPills() {
  const pills = document.getElementById('langPills');
  if (!targetLangs.length) {
    pills.innerHTML = '<span style="font-size:.72rem;color:var(--muted);font-style:italic">none added</span>';
    return;
  }
  pills.innerHTML = targetLangs.map(l => `
    <div class="lpill">
      <span class="lpill-dot" style="background:${l.color}"></span>
      <span class="lpill-label">${l.label}</span>
      <button class="lpill-rm" data-code="${l.code}">✕</button>
    </div>`).join('');
  pills.querySelectorAll('.lpill-rm').forEach(b => b.addEventListener('click', () => {
    targetLangs = targetLangs.filter(l => l.code !== b.dataset.code);
    renderPills();
  }));
}

document.getElementById('addLangBtn').addEventListener('click', () => {
  const used = targetLangs.map(l => l.code);
  const avail = ALL_LANGS.filter(l => !used.includes(l.code));
  if (!avail.length) return;
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `<div class="picker">
    <div class="picker-title">Add translation language</div>
    <div class="picker-list">${avail.map(l=>`<button class="picker-item" data-code="${l.code}">${l.label}</button>`).join('')}</div>
    <button class="picker-close">Cancel</button>
  </div>`;
  overlay.querySelectorAll('.picker-item').forEach(b => b.addEventListener('click', () => {
    const found = ALL_LANGS.find(l => l.code === b.dataset.code);
    if (found) { targetLangs.push({...found, color:COLORS[targetLangs.length%COLORS.length]}); renderPills(); }
    document.body.removeChild(overlay);
  }));
  overlay.querySelector('.picker-close').addEventListener('click', () => document.body.removeChild(overlay));
  document.body.appendChild(overlay);
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (!messages.length || confirm('Clear conversation?')) { messages = []; renderThread(); }
});
document.getElementById('exportBtn').addEventListener('click', () => {
  if (!messages.length) { alert('Nothing to export yet.'); return; }
  const txt = messages.map(m =>
    `[${m.time}] ${m.lang}: ${m.original}\n` +
    Object.entries(m.translations).map(([c,t])=>{
      const l=targetLangs.find(x=>x.code===c);
      return `  -> [${l?l.label:c}] ${t}`;
    }).join('\n')
  ).join('\n\n');
  const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([txt],{type:'text/plain'})),download:`voicebridge-${Date.now()}.txt`});
  a.click();
});

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// Init
renderPills();
renderThread();
</script>
