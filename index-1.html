<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceBridge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#080b12;
  --s1:#0d1220;
  --s2:#131a2e;
  --s3:#192038;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.11);
  --text:#dde4f0;
  --muted:#3d4f6b;
  --muted2:#5a7099;
  --accent:#4f8ef7;
  --live:#22c55e;
  --grad:linear-gradient(135deg,#4f8ef7 0%,#06b6d4 100%);
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px}
body{display:flex;flex-direction:column;min-height:100vh;height:100vh;overflow:auto}

/* ── Header ────────────────────────────────── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid var(--border);
  background:var(--s1);flex-shrink:0;gap:12px;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{
  width:32px;height:32px;border-radius:8px;background:var(--grad);
  display:grid;place-items:center;font-size:16px;flex-shrink:0;
}
.brand-name{font-size:1.05rem;font-weight:700;background:var(--grad);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-sub{font-size:.68rem;color:var(--muted2);font-family:'JetBrains Mono',monospace;letter-spacing:.04em;margin-top:1px}

.hdr-right{display:flex;align-items:center;gap:8px}
.hbtn{
  background:none;border:1px solid var(--border2);border-radius:7px;
  color:var(--muted2);font-size:.75rem;padding:5px 11px;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .18s;
}
.hbtn:hover{color:var(--text);border-color:var(--border2)}
.hbtn.danger:hover{color:#ef4444;border-color:#ef4444}

/* ── Language config bar ────────────────────── */
.lang-bar{
  background:var(--s1);border-bottom:1px solid var(--border);
  padding:10px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;
}
.lang-bar-label{font-size:.67rem;font-family:'JetBrains Mono',monospace;color:var(--muted2);
  text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;}

.lang-pills{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.lang-pill{
  display:flex;align-items:center;gap:7px;
  background:var(--s2);border:1px solid var(--border2);border-radius:20px;
  padding:4px 6px 4px 10px;cursor:default;transition:border-color .2s;
}
.lang-pill.active{border-color:rgba(79,142,247,0.45)}
.pill-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pill-label{font-size:.78rem;font-weight:500;color:var(--text);white-space:nowrap}
select.pill-select{
  background:var(--s3);color:var(--text);border:1px solid var(--border);
  border-radius:5px;padding:3px 6px;font-family:'Inter',sans-serif;font-size:.73rem;
  cursor:pointer;outline:none;max-width:140px;
}
select.pill-select:focus{border-color:var(--accent)}
.pill-remove{
  background:none;border:none;color:var(--muted2);cursor:pointer;
  font-size:.8rem;padding:2px 4px;border-radius:4px;line-height:1;transition:color .18s;
}
.pill-remove:hover{color:#ef4444}
.add-lang-btn{
  display:flex;align-items:center;gap:5px;background:none;border:1px dashed var(--muted);
  border-radius:20px;padding:4px 12px;color:var(--muted2);font-size:.75rem;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap;
}
.add-lang-btn:hover{color:var(--accent);border-color:var(--accent)}

/* ── Thread ─────────────────────────────────── */
.thread-wrap{flex:1;min-height:120px;overflow-y:auto;padding:24px 20px 16px;display:flex;flex-direction:column;gap:0}
.thread-wrap::-webkit-scrollbar{width:3px}
.thread-wrap::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}

.empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;color:var(--muted2);gap:10px;padding:40px;margin:auto;
}
.empty-icon{font-size:2.8rem;opacity:.35;margin-bottom:4px}
.empty-title{font-size:.95rem;font-weight:600;color:var(--muted2)}
.empty-body{font-size:.8rem;line-height:1.7;max-width:260px;color:var(--muted)}

/* ── Message ─────────────────────────────────── */
.msg-group{display:flex;flex-direction:column;margin-bottom:20px}

.msg-header{
  display:flex;align-items:center;gap:7px;margin-bottom:6px;
}
.msg-avatar{
  width:22px;height:22px;border-radius:50%;display:grid;place-items:center;
  font-size:.65rem;font-weight:700;color:#fff;flex-shrink:0;
}
.msg-speaker{font-size:.72rem;font-weight:600;letter-spacing:.01em}
.msg-lang-badge{
  font-size:.62rem;font-family:'JetBrains Mono',monospace;color:var(--muted2);
  background:var(--s2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;
}
.msg-time{font-size:.62rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-left:auto}

/* ── Bubbles ─────────────────────────────────── */
.bubble-stack{display:flex;flex-direction:column;gap:4px;margin-left:29px}

.bubble-orig{
  display:inline-block;font-size:.78rem;color:var(--muted2);
  font-style:italic;line-height:1.5;padding:0 2px;word-break:break-word;
}

.bubble-trans{
  display:inline-block;max-width:72%;background:var(--s2);border:1px solid var(--border2);
  border-radius:4px 16px 16px 16px;padding:10px 14px;font-size:.94rem;
  line-height:1.65;color:var(--text);word-break:break-word;position:relative;
  transition:opacity .2s;
}
.bubble-trans.live{
  border-color:rgba(79,142,247,0.3);
  background:linear-gradient(135deg,rgba(79,142,247,0.07),rgba(6,182,212,0.05));
}

/* Typing cursor */
.cursor{
  display:inline-block;width:2px;height:1em;background:var(--accent);
  vertical-align:text-bottom;margin-left:2px;
  animation:blink-cur .7s step-end infinite;
}
@keyframes blink-cur{0%,100%{opacity:1}50%{opacity:0}}

.bubble-actions{
  display:flex;gap:5px;margin-top:5px;opacity:0;transition:opacity .18s;
}
.bubble-stack:hover .bubble-actions{opacity:1}
.bact{
  background:none;border:1px solid var(--border);border-radius:5px;
  color:var(--muted2);font-size:.66rem;padding:2px 8px;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .18s;
}
.bact:hover{color:var(--text);border-color:var(--border2)}
.bact.speak:hover{color:#06b6d4;border-color:#06b6d4}

/* ── Live bar ────────────────────────────────── */
.live-bar{
  background:var(--s1);border-top:1px solid var(--border);
  padding:12px 20px;flex-shrink:0;display:none;flex-direction:column;gap:4px;
  position:sticky;bottom:0;z-index:9;
}
.live-bar.show{display:flex}
.live-bar-top{display:flex;align-items:center;gap:8px}
.live-ind{
  display:flex;align-items:center;gap:5px;font-size:.67rem;
  font-family:'JetBrains Mono',monospace;color:var(--live);
}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--live);animation:pulse-dot 1s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
.live-speaker-tag{font-size:.7rem;font-weight:600;margin-left:4px}
.live-orig-text{font-size:.78rem;color:var(--muted2);font-style:italic;min-height:18px;line-height:1.5}
.live-trans-text{font-size:.9rem;color:var(--text);min-height:20px;line-height:1.5}

/* ── Big mic button ──────────────────────────── */
.mic-zone{
  background:var(--s1);border-top:1px solid var(--border);
  padding:16px 20px;display:flex;align-items:center;justify-content:center;gap:16px;
  flex-shrink:0;position:sticky;bottom:0;z-index:10;
}
.big-mic{
  width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;
  display:grid;place-items:center;font-size:1.7rem;
  background:var(--grad);
  box-shadow:0 4px 24px rgba(79,142,247,0.3);
  transition:transform .15s,box-shadow .2s;position:relative;
}
.big-mic:hover{transform:scale(1.06);box-shadow:0 6px 32px rgba(79,142,247,0.45)}
.big-mic:active{transform:scale(.95)}
.big-mic.on{
  background:linear-gradient(135deg,#ef4444,#f97316);
  box-shadow:0 4px 24px rgba(239,68,68,0.35);
  animation:mic-pulse 1.4s ease-in-out infinite;
}
@keyframes mic-pulse{
  0%,100%{box-shadow:0 4px 24px rgba(239,68,68,0.35)}
  50%{box-shadow:0 4px 40px rgba(239,68,68,0.6),0 0 0 14px rgba(239,68,68,0.08)}
}
.mic-label{font-size:.78rem;color:var(--muted2);font-family:'JetBrains Mono',monospace;letter-spacing:.04em;text-align:center;max-width:180px;line-height:1.5}

/* ── Spinny ──────────────────────────────────── */
.spin{display:inline-block;width:11px;height:11px;border:1.5px solid var(--border2);
  border-top-color:var(--accent);border-radius:50%;animation:spinning .55s linear infinite;vertical-align:middle;margin-left:3px}
@keyframes spinning{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">🌐</div>
    <div>
      <div class="brand-name">VoiceBridge</div>
      <div class="brand-sub">auto-detect · live translate</div>
    </div>
  </div>
  <div class="hdr-right">
    <button class="hbtn danger" id="clearBtn">Clear</button>
    <button class="hbtn" id="exportBtn">Export</button>
  </div>
</header>

<!-- Language configuration -->
<div class="lang-bar">
  <span class="lang-bar-label">Languages in use:</span>
  <div class="lang-pills" id="langPills"></div>
  <button class="add-lang-btn" id="addLangBtn">+ Add language</button>
</div>

<!-- Conversation thread -->
<div class="thread-wrap" id="thread">
  <div class="empty" id="emptyState">
    <div class="empty-icon">🎙</div>
    <div class="empty-title">Ready to listen</div>
    <div class="empty-body">Add the languages being spoken, press the mic, and start talking. Speech is detected and translated automatically.</div>
  </div>
</div>

<!-- Live preview bar -->
<div class="live-bar" id="liveBar">
  <div class="live-bar-top">
    <div class="live-ind"><span class="live-dot"></span>LIVE</div>
    <span class="live-speaker-tag" id="liveSpeakerTag"></span>
  </div>
  <div class="live-orig-text" id="liveOrig"></div>
  <div class="live-trans-text" id="liveTrans"></div>
</div>

<!-- Mic -->
<div class="mic-zone">
  <button class="big-mic" id="micBtn">🎙</button>
  <div class="mic-label" id="micLabel">Press to start listening</div>
</div>

<script>
// ─── Language registry ────────────────────────────────
const ALL_LANGS = [
  {code:'en-GB',  label:'English',              name:'English'},
  {code:'ms-MY',  label:'Malay',                name:'Malay'},
  {code:'zh-CN',  label:'Mandarin (Simplified)',name:'Mandarin Chinese (Simplified)'},
  {code:'zh-TW',  label:'Mandarin (Traditional)',name:'Mandarin Chinese (Traditional)'},
  {code:'es-ES',  label:'Spanish',              name:'Spanish'},
  {code:'fr-FR',  label:'French',               name:'French'},
  {code:'de-DE',  label:'German',               name:'German'},
  {code:'it-IT',  label:'Italian',              name:'Italian'},
  {code:'pt-BR',  label:'Portuguese',           name:'Portuguese'},
  {code:'ja-JP',  label:'Japanese',             name:'Japanese'},
  {code:'ko-KR',  label:'Korean',               name:'Korean'},
  {code:'ar-SA',  label:'Arabic',               name:'Arabic'},
  {code:'hi-IN',  label:'Hindi',                name:'Hindi'},
  {code:'th-TH',  label:'Thai',                 name:'Thai'},
  {code:'vi-VN',  label:'Vietnamese',           name:'Vietnamese'},
  {code:'id-ID',  label:'Indonesian',           name:'Indonesian'},
  {code:'ru-RU',  label:'Russian',              name:'Russian'},
  {code:'tr-TR',  label:'Turkish',              name:'Turkish'},
  {code:'nl-NL',  label:'Dutch',                name:'Dutch'},
  {code:'pl-PL',  label:'Polish',               name:'Polish'},
  {code:'sv-SE',  label:'Swedish',              name:'Swedish'},
  {code:'ar-AE',  label:'Arabic (Gulf)',        name:'Arabic'},
];

const COLORS = ['#4f8ef7','#22c55e','#f59e0b','#ef4444','#a855f7','#06b6d4','#f97316','#ec4899','#14b8a6','#84cc16'];

// ─── App state ────────────────────────────────────────
let activeLangs = [
  {code:'en-GB', label:'English', color:COLORS[0]},
  {code:'ms-MY', label:'Malay',   color:COLORS[1]},
];
let messages = [];
let listening = false;
let recognitions = []; // one SpeechRecognition per active language
let liveByLang = {};   // code → {orig, trans, timeout, translating}
let pendingLang = null; // which lang is currently "winning" the live bar
let liveTransTimeout = null;
let lastLiveKey = '';
let msgIdCounter = 0;

// ─── Language pills ───────────────────────────────────
function renderPills() {
  const pills = document.getElementById('langPills');
  pills.innerHTML = activeLangs.map((l, i) => `
    <div class="lang-pill" id="pill-${l.code}">
      <span class="pill-dot" style="background:${l.color}"></span>
      <span class="pill-label">${l.label}</span>
      ${activeLangs.length > 1
        ? `<button class="pill-remove" data-code="${l.code}" title="Remove">✕</button>`
        : ''}
    </div>
  `).join('');

  pills.querySelectorAll('.pill-remove').forEach(btn => {
    btn.addEventListener('click', () => removeLang(btn.dataset.code));
  });
}

function addLangPrompt() {
  const usedCodes = activeLangs.map(l => l.code);
  const available = ALL_LANGS.filter(l => !usedCodes.includes(l.code));
  if (!available.length) return;

  // Simple inline select-then-confirm approach
  const code = prompt(
    'Enter language code to add:\n\n' +
    available.map(l => `${l.code} — ${l.label}`).join('\n')
  );
  if (!code) return;
  const found = ALL_LANGS.find(l => l.code === code.trim());
  if (!found) { alert('Language code not recognised.'); return; }
  if (usedCodes.includes(found.code)) return;
  activeLangs.push({code: found.code, label: found.label, color: COLORS[activeLangs.length % COLORS.length]});
  renderPills();
  if (listening) restartAll();
}

function removeLang(code) {
  activeLangs = activeLangs.filter(l => l.code !== code);
  renderPills();
  if (listening) restartAll();
}

document.getElementById('addLangBtn').addEventListener('click', () => {
  // Build a nicer picker inline
  showLangPicker();
});

function showLangPicker() {
  const usedCodes = activeLangs.map(l => l.code);
  const available = ALL_LANGS.filter(l => !usedCodes.includes(l.code));
  if (!available.length) { alert('All available languages are already added.'); return; }

  // Overlay
  const overlay = document.createElement('div');
  overlay.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px`;
  overlay.innerHTML = `
    <div style="background:#0f1520;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;max-width:340px;width:100%">
      <div style="font-weight:600;font-size:1rem;margin-bottom:14px;color:#dde4f0">Add a language</div>
      <div style="display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;margin-bottom:14px">
        ${available.map(l => `
          <button data-code="${l.code}" style="background:#131a2e;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:9px 14px;color:#dde4f0;cursor:pointer;font-family:Inter,sans-serif;font-size:.85rem;text-align:left;transition:all .15s"
            onmouseover="this.style.borderColor='rgba(79,142,247,0.5)'"
            onmouseout="this.style.borderColor='rgba(255,255,255,0.08)'">
            ${l.label} <span style="color:#3d4f6b;font-size:.72rem;font-family:JetBrains Mono,monospace">${l.code}</span>
          </button>`).join('')}
      </div>
      <button id="pickerClose" style="background:none;border:1px solid rgba(255,255,255,0.1);border-radius:7px;padding:7px 18px;color:#5a7099;cursor:pointer;font-family:Inter,sans-serif;font-size:.8rem">Cancel</button>
    </div>`;

  overlay.querySelectorAll('[data-code]').forEach(btn => {
    btn.addEventListener('click', () => {
      const found = ALL_LANGS.find(l => l.code === btn.dataset.code);
      if (found) {
        activeLangs.push({code:found.code, label:found.label, color:COLORS[activeLangs.length % COLORS.length]});
        renderPills();
        if (listening) restartAll();
      }
      document.body.removeChild(overlay);
    });
  });
  overlay.querySelector('#pickerClose').addEventListener('click', () => document.body.removeChild(overlay));
  document.body.appendChild(overlay);
}

// ─── Recognition engine ───────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function buildRecognition(langObj) {
  if (!SpeechRecognition) return null;
  const rec = new SpeechRecognition();
  rec.continuous = true;
  rec.interimResults = true;
  rec.lang = langObj.code;
  rec.maxAlternatives = 1;

  liveByLang[langObj.code] = {orig:'', trans:'', timeout:null, translating:false, lastFinal:''};

  rec.onresult = (event) => {
    let interim = '';
    let newFinal = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      const conf = event.results[i][0].confidence;
      if (event.results[i].isFinal) {
        newFinal += t + ' ';
      } else {
        interim += t;
      }
    }

    const state = liveByLang[langObj.code];
    if (!state) return;

    if (newFinal) state.lastFinal = (state.lastFinal || '') + newFinal;
    const full = ((state.lastFinal || '') + interim).trim();

    // Only surface this lang if it has actual content
    if (!full) return;

    // This lang is "winning" — show it in live bar
    // (All recognitions run simultaneously; we show whichever is speaking)
    state.orig = full;
    updateLiveBar(langObj, full, interim !== '' && !newFinal);

    // Debounce translation
    clearTimeout(state.timeout);
    state.timeout = setTimeout(() => {
      translateLive(langObj, full, false);
    }, 500);
  };

  rec.onend = () => {
    if (listening) {
      // Auto-restart
      setTimeout(() => { try { rec.start(); } catch(e){} }, 150);
    }
  };

  rec.onerror = (e) => {
    if (e.error === 'no-speech') return; // normal
    console.warn(`[${langObj.code}] error:`, e.error);
    if (listening && e.error !== 'aborted') {
      setTimeout(() => { try { rec.start(); } catch(e){} }, 300);
    }
  };

  return rec;
}

function startAll() {
  recognitions = activeLangs.map(l => buildRecognition(l)).filter(Boolean);
  recognitions.forEach(r => { try { r.start(); } catch(e){} });
}

function stopAll() {
  recognitions.forEach(r => { try { r.stop(); } catch(e){} });
  recognitions = [];
  liveByLang = {};
}

function restartAll() {
  stopAll();
  if (listening) startAll();
}

// ─── Live bar ─────────────────────────────────────────
let liveBarLang = null; // which lang is currently shown
let liveBarClearTimeout = null;

function updateLiveBar(langObj, origText, isInterim) {
  const bar = document.getElementById('liveBar');
  const origEl = document.getElementById('liveOrig');
  const transEl = document.getElementById('liveTrans');
  const tag = document.getElementById('liveSpeakerTag');

  bar.classList.add('show');
  liveBarLang = langObj;

  // Clear auto-hide
  clearTimeout(liveBarClearTimeout);

  tag.textContent = langObj.label;
  tag.style.color = langObj.color;
  origEl.textContent = origText;

  // Show cursor on trans if interim
  if (isInterim) {
    if (transEl.textContent && !transEl.querySelector('.cursor')) {
      transEl.innerHTML = transEl.textContent + '<span class="cursor"></span>';
    }
  }
}

function clearLiveBarFor(code) {
  if (liveBarLang && liveBarLang.code === code) {
    clearTimeout(liveBarClearTimeout);
    liveBarClearTimeout = setTimeout(() => {
      document.getElementById('liveBar').classList.remove('show');
      document.getElementById('liveOrig').textContent = '';
      document.getElementById('liveTrans').textContent = '';
      liveBarLang = null;
    }, 800);
  }
}

// ─── Translation ──────────────────────────────────────
// For live bar translations (frequent, debounced)
async function translateLive(langObj, text, isInterim) {
  const state = liveByLang[langObj.code];
  if (!state) return;
  if (state.translating) return;

  // Determine target: translate into every OTHER active language
  // For live bar, use the first other language
  const others = activeLangs.filter(l => l.code !== langObj.code);
  if (!others.length) return;
  const targetName = others[0].name || others[0].label;

  state.translating = true;
  const transEl = document.getElementById('liveTrans');

  if (liveBarLang && liveBarLang.code === langObj.code) {
    transEl.innerHTML = `<span class="spin"></span>`;
  }

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system:`You are a real-time voice translator. Translate into ${targetName}. Return ONLY the translation — no quotes, no preamble, no explanation.`,
        messages:[{role:'user',content:text}]
      })
    });
    const data = await resp.json();
    const translated = data?.content?.[0]?.text?.trim() || '';
    state.trans = translated;

    if (liveBarLang && liveBarLang.code === langObj.code) {
      transEl.textContent = translated;
    }

    // Commit as message when we get a final result
    if (!isInterim && state.lastFinal && state.lastFinal.trim()) {
      commitMessage(langObj, state.lastFinal.trim(), translated, others);
      state.lastFinal = '';
      clearLiveBarFor(langObj.code);
    }
  } catch(e) {
    if (liveBarLang && liveBarLang.code === langObj.code) {
      transEl.textContent = '⚠ Translation error';
    }
  }
  state.translating = false;
}

// ─── Commit to thread ─────────────────────────────────
function commitMessage(langObj, original, primaryTrans, otherLangs) {
  const id = ++msgIdCounter;
  const msg = {
    id,
    langCode: langObj.code,
    langLabel: langObj.label,
    langColor: langObj.color,
    original,
    translations: {}, // code → text
    time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
    pending: {},
  };

  // Primary translation
  if (otherLangs.length > 0) {
    msg.translations[otherLangs[0].code] = primaryTrans;
  }

  // Fetch additional translations if more than 2 langs
  otherLangs.slice(1).forEach(tl => {
    msg.pending[tl.code] = true;
    fetchExtraTranslation(msg, original, tl).then(() => renderThread());
  });

  messages.push(msg);
  renderThread();
}

async function fetchExtraTranslation(msg, text, targetLang) {
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system:`Translate into ${targetLang.name || targetLang.label}. Return ONLY the translation.`,
        messages:[{role:'user',content:text}]
      })
    });
    const data = await resp.json();
    msg.translations[targetLang.code] = data?.content?.[0]?.text?.trim() || '—';
    delete msg.pending[targetLang.code];
  } catch(e) {
    msg.translations[targetLang.code] = '⚠ Error';
    delete msg.pending[targetLang.code];
  }
}

// ─── Render thread ────────────────────────────────────
function renderThread() {
  const thread = document.getElementById('thread');
  const empty = document.getElementById('emptyState');

  if (!messages.length) {
    thread.innerHTML = '';
    thread.appendChild(empty);
    empty.style.display = 'flex';
    return;
  }

  empty.style.display = 'none';

  const others = (langCode) => activeLangs.filter(l => l.code !== langCode);

  thread.innerHTML = messages.map(msg => {
    const otherLangs = others(msg.langCode);
    const transBlocks = otherLangs.map(tl => {
      const text = msg.translations[tl.code];
      const pending = msg.pending[tl.code];
      return `
        <div style="display:flex;flex-direction:column;gap:2px">
          ${otherLangs.length > 1 ? `<div style="font-size:.62rem;color:${tl.color};font-family:'JetBrains Mono',monospace;margin-bottom:2px">${tl.label}</div>` : ''}
          <div class="bubble-trans${pending?' live':''}" data-msgid="${msg.id}" data-langcode="${tl.code}">
            ${pending
              ? `<span style="color:var(--muted2)">Translating<span class="spin"></span></span>`
              : escHtml(text || '—')}
          </div>
        </div>`;
    }).join('');

    return `
      <div class="msg-group" id="msg-${msg.id}">
        <div class="msg-header">
          <div class="msg-avatar" style="background:${msg.langColor}">${msg.langLabel[0]}</div>
          <span class="msg-speaker" style="color:${msg.langColor}">${escHtml(msg.langLabel)}</span>
          <span class="msg-lang-badge">${msg.langCode}</span>
          <span class="msg-time">${msg.time}</span>
        </div>
        <div class="bubble-stack">
          <div class="bubble-orig">${escHtml(msg.original)}</div>
          ${transBlocks}
          <div class="bubble-actions">
            ${otherLangs.map(tl => {
              const text = msg.translations[tl.code] || '';
              return text && !msg.pending[tl.code]
                ? `<button class="bact speak" data-text="${escHtml(text)}" data-lang="${tl.code}">🔊 ${tl.label}</button>`
                : '';
            }).join('')}
            <button class="bact" data-copy="${msg.id}">Copy all</button>
          </div>
        </div>
      </div>`;
  }).join('');

  // Bind actions
  thread.querySelectorAll('.bact.speak').forEach(btn => {
    btn.addEventListener('click', () => {
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(btn.dataset.text);
      utt.lang = btn.dataset.lang;
      window.speechSynthesis.speak(utt);
    });
  });
  thread.querySelectorAll('[data-copy]').forEach(btn => {
    btn.addEventListener('click', () => {
      const msg = messages.find(m => m.id == btn.dataset.copy);
      if (!msg) return;
      const parts = [`[${msg.langLabel}] ${msg.original}`,
        ...Object.entries(msg.translations).map(([code,t]) => {
          const l = activeLangs.find(x=>x.code===code);
          return `[${l ? l.label : code}] ${t}`;
        })];
      navigator.clipboard.writeText(parts.join('\n'));
    });
  });

  thread.scrollTop = thread.scrollHeight;
}

// ─── Mic button ───────────────────────────────────────
const micBtn = document.getElementById('micBtn');
const micLabel = document.getElementById('micLabel');

micBtn.addEventListener('click', () => {
  if (!SpeechRecognition) {
    alert('Web Speech API not supported — please use Chrome or Edge.');
    return;
  }
  if (listening) {
    listening = false;
    stopAll();
    micBtn.classList.remove('on');
    micBtn.textContent = '🎙';
    micLabel.textContent = 'Press to start listening';
    document.getElementById('liveBar').classList.remove('show');
  } else {
    listening = true;
    startAll();
    micBtn.classList.add('on');
    micBtn.textContent = '⏹';
    micLabel.textContent = `Listening for ${activeLangs.map(l=>l.label).join(' & ')}…`;
  }
});

// ─── Header buttons ───────────────────────────────────
document.getElementById('clearBtn').addEventListener('click', () => {
  if (!confirm('Clear conversation?')) return;
  messages = [];
  renderThread();
});

document.getElementById('exportBtn').addEventListener('click', () => {
  if (!messages.length) { alert('Nothing to export.'); return; }
  const lines = messages.map(m => {
    const trans = Object.entries(m.translations)
      .map(([code,t]) => { const l=activeLangs.find(x=>x.code===code); return `  → [${l?l.label:code}] ${t}`; })
      .join('\n');
    return `[${m.time}] ${m.langLabel}: ${m.original}\n${trans}`;
  }).join('\n\n');
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([lines],{type:'text/plain'})),
    download:`voicebridge-${Date.now()}.txt`
  });
  a.click();
});

// ─── Helpers ──────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ─────────────────────────────────────────────
renderPills();
renderThread();
</script>
